<div  ng-app="appClasificadosRequisicion" ng-controller="ctrlClasificadosRequisicion">
    <red-Toolbar titulo="Clasificado Requisiciones - Listado">
        <button class="btn-icon25p btn-agregar25p" ng-click="abrirModal()"></button>
    </red-Toolbar>
    <br>
    <div red-panel>
        <div class="row">
            <div class="col-md-12">
                <div class="col-md-3">
                    Clave:
                    <input type="text"
                           id="id_clave"
                           placeholder="Clave"
                           ng-model="id_ClaveClasificadoRequisicionListado"
                           class="form-control contenido_numerico"
                           change-focus
                           maxlength='9'
                           ng-focus="">
                </div>
                <div class="col-md-4">
                    Clasificado de Requisición:
                    <input type="text"
                           placeholder="Clasificado de Requisición"
                           ng-model="de_NombreClasificadoRequisicionListado"
                           class="form-control"
                           change-focus
                           maxlength='200'>
                </div>
                <div class="col-md-4">
                    Tipo de Requisición:
                    <select  ng-model="id_TipoRequisicionListado"
                             class="form-control"
                             >
                        <option value="">Seleccionar</option>
                        <option ng-repeat="Requisicion in TiposRequisicion " value="{{Requisicion.ID_TIPOREQUISICION}}">{{Requisicion.DE_TIPOREQUISICION}}</option>
                    </select>
                </div>
                <div class="col-md-1" style="padding-top: 18px;">
                    <button class="contenido btn-icon25p btn-buscar25p" ng-click="listar()"></button>
                </div>
            </div>
        </div>

    </div>
    <br>

    <div ng-grid="ClasificadosRequisicionData"  class="gridStyle" red-grid></div>

    <red-modal name="modal" titulo="Agregar Clasificación de Requisición">
        <table width="100%">
            <tr>
                <td colspan="2">
                    Nombre de Clasificado de Requisición:
                    <input id="Clasificado_Requisicion"
                           ng-model="de_ClasificadoRequisicion"
                           placeholder="Clasificado de Requisición"
                           type="text"
                           class="form-control"
                           change-focus
                           maxlength="250"
                           red-validatorName="agregar"
                           red-validator="text"
                           required
                           alias="Clasificado de Requisición">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    Tipo de Requisición:
                    <select  ng-model="id_TipoRequisicion"
                             class="form-control"
                             red-validatorName="agregar"
                             red-validator="text"
                             required
                             alias="Tipo de Requisición">
                        <option value="">Seleccionar</option>
                        <option ng-repeat="Requisicion in TiposRequisicion " value="{{Requisicion.ID_TIPOREQUISICION}}">{{Requisicion.DE_TIPOREQUISICION}}</option>
                    </select>
                </td>
            </tr>

        <div class="modal-footer">
            <button ng-model="btnGuardar" ng-click="guardar()" class="btn btn-primary">Guardar</button>
        </div>
    </red-modal>
</div>
